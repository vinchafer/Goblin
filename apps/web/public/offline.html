<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Goblin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #F7F4ED;
      color: #2A2A2A;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .icon { font-size: 64px; margin-bottom: 20px; line-height: 1; }
    h1 {
      font-family: Georgia, serif;
      font-size: 28px;
      color: #2D4A2B;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }
    p {
      font-size: 15px;
      color: #6B6B6B;
      line-height: 1.65;
      max-width: 340px;
      margin: 0 auto 28px;
    }
    button {
      background: #2D4A2B;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <div>
    <div class="icon">👺</div>
    <h1>You&rsquo;re offline</h1>
    <p>Your work is saved in the cloud — reconnect to continue building.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
