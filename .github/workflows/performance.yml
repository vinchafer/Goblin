name: Performance Budget

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  bundle-analysis:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build web app
        working-directory: apps/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder' }}
          NEXT_PUBLIC_API_URL: http://localhost:3001
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: pnpm build

      - name: Analyze bundle
        working-directory: apps/web
        run: |
          # Extract initial JS size from Next.js build output
          INITIAL_JS=$(cat .next/build-manifest.json 2>/dev/null | python3 -c "
          import json, sys, os
          data = json.load(sys.stdin)
          pages = data.get('pages', {})
          total = 0
          for page, chunks in pages.items():
              for chunk in chunks:
                  path = f'.next/static/{chunk}'
                  if os.path.exists(path):
                      total += os.path.getsize(path)
          print(total // 1024)
          " 2>/dev/null || echo "0")
          echo "Initial JS: ${INITIAL_JS}KB"
          echo "INITIAL_JS_KB=${INITIAL_JS}" >> $GITHUB_ENV

      - name: Check bundle budget (< 400KB initial JS)
        run: |
          if [ "${INITIAL_JS_KB:-0}" -gt 400 ]; then
            echo "❌ Initial JS bundle ${INITIAL_JS_KB}KB exceeds 400KB budget"
            exit 1
          else
            echo "✅ Initial JS bundle ${INITIAL_JS_KB}KB within budget"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: next-build
          path: apps/web/.next/
          retention-days: 7

  sentry-release:
    name: Sentry Release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: bundle-analysis
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Sentry release
        uses: getsentry/action-release@v1
        if: env.SENTRY_AUTH_TOKEN != ''
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production
          version: ${{ github.sha }}
