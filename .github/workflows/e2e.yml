name: E2E Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Pin to an explicit supported LTS (Node 22) so the runner can't silently
          # drift the version under us (GitHub is migrating the Node-20 action runtime
          # to Node 24 gradually — a moving floor that "randomly" breaks jobs ~weekly).
          # App engines allow >=20; 22 is current LTS and reproducible here.
          node-version: '22'
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @goblin/web build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder' }}
          NEXT_PUBLIC_API_URL: http://localhost:3001
      - run: npx playwright install --with-deps chromium
      - name: Run E2E Tests (CI subset — @public + @auth)
        run: pnpm test:e2e:ci
        env:
          NODE_ENV: test
          CI: 'true'
          ENABLE_TEST_AUTH: 'true'
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder' }}
          NEXT_PUBLIC_API_URL: http://localhost:3001
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_ACCOUNT_EMAIL: ${{ secrets.TEST_ACCOUNT_EMAIL }}
          TEST_ACCOUNT_PASSWORD: ${{ secrets.TEST_ACCOUNT_PASSWORD }}
          # API backend env (required by apps/api startup validation — stubs OK for @public+@auth)
          STRIPE_PRICE_BUILD_TIER1: ${{ secrets.STRIPE_PRICE_BUILD_TIER1 || 'price_ci_stub_build' }}
          STRIPE_PRICE_PRO_TIER1: ${{ secrets.STRIPE_PRICE_PRO_TIER1 || 'price_ci_stub_pro' }}
          STRIPE_PRICE_POWER_TIER1: ${{ secrets.STRIPE_PRICE_POWER_TIER1 || 'price_ci_stub_power' }}
          # ENCRYPTION_KEY: intentionally omitted — BYOK tests are @local-only
          # API still requires it for startup; use minimal placeholder
          ENCRYPTION_KEY: ci-noop-encryption-key
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
