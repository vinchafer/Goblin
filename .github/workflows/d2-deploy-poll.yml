# D2 diagnosis (feel-sprint-1): verify from a cloud runner whether a Goblin
# publish ever serves truncated/stale content after the platform reports the
# deployment READY. Triggers a real deploy through the normal API pipeline,
# then polls the served URL every 5s for 5 minutes logging status, byte length
# and content hash. Temporary diagnostic — remove after FEEL-1 sprint.
name: d2-deploy-poll

on:
  workflow_dispatch:
    inputs:
      jwt:
        description: Test-account JWT (vinc.hafner3, short-lived)
        required: true
      project_id:
        description: Goblin project id to deploy
        required: true
      api_url:
        description: API base URL
        required: true
        default: https://goblinapi-production.up.railway.app
      iterations:
        description: Number of deploy+poll cycles
        required: true
        default: "3"

jobs:
  deploy-poll:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: deploy and poll
        env:
          JWT: ${{ inputs.jwt }}
          PROJECT_ID: ${{ inputs.project_id }}
          API_URL: ${{ inputs.api_url }}
          ITERATIONS: ${{ inputs.iterations }}
        run: |
          set -uo pipefail
          for i in $(seq 1 "$ITERATIONS"); do
            echo "=== ITERATION $i ==="
            echo "deploy-start: $(date -u +%FT%T.%3NZ)"
            curl -sN --max-time 240 \
              -X POST "$API_URL/api/deploy/vercel" \
              -H "Authorization: Bearer $JWT" \
              -H "Content-Type: application/json" \
              -d "{\"projectId\":\"$PROJECT_ID\"}" | tee "sse_$i.log"
            echo ""
            echo "deploy-end: $(date -u +%FT%T.%3NZ)"
            URL=$(grep -o '"type":"success","url":"[^"]*"' "sse_$i.log" | head -1 | sed 's/.*"url":"//;s/"$//')
            if [ -z "$URL" ]; then
              echo "NO SUCCESS URL — SSE tail:"; tail -c 2000 "sse_$i.log"; continue
            fi
            echo "polling: $URL"
            END=$(( $(date +%s) + 300 ))
            while [ "$(date +%s)" -lt "$END" ]; do
              TS=$(date -u +%FT%T.%3NZ)
              OUT=$(curl -s --max-time 10 -o body.html -w "%{http_code}" "$URL" || echo "ERR")
              LEN=$(wc -c < body.html 2>/dev/null || echo 0)
              HASH=$(sha256sum body.html 2>/dev/null | cut -c1-16)
              echo "POLL,$i,$TS,$OUT,$LEN,$HASH"
              sleep 5
            done
          done
