<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>InstallAppBlock — Launch-Assist U1 states</title>
<style>
  /* LAUNCH-ASSIST U1 render harness — reproduces every InstallAppBlock affordance
     (the landing-page "Goblin als App installieren" block) so each platform state is
     visible for screenshots. The mode-selection + no-phantom-button logic is locked
     deterministically in lib/pwa-install.test.ts (resolveLandingInstallMode /
     showNativeInstallButton). Tokens mirror the landing scope (.landing-root). */
  .theme {
    --surface:#F4ECD8; --surface-elev:#FBF7EC; --line:rgba(15,43,30,.12);
    --ink-1:#0F2B1E; --ink-2:#2c4538; --ink-3:#5c6f64; --green:#0F2B1E; --bone:#F4ECD8;
    --accent:#D4A737; --accent-soft:rgba(212,167,55,.14);
    --shadow-card:0 1px 0 rgba(15,43,30,.04), 0 20px 40px -28px rgba(15,43,30,.20);
  }
  .theme.dark {
    --surface:#0F2B1E; --surface-elev:#12241a; --line:rgba(244,236,216,.14);
    --ink-1:#F4ECD8; --ink-2:#dfe7de; --ink-3:#9fb0a4; --green:#7FA98A; --bone:#0b1f15;
    --accent:#E8C572; --accent-soft:rgba(212,167,55,.16);
    --shadow-card:0 1px 0 rgba(244,236,216,.04), 0 24px 60px -28px rgba(0,0,0,.55);
    background:#091A11;
  }
  * { box-sizing:border-box; margin:0; padding:0; font-family:system-ui,-apple-system,"Segoe UI",sans-serif; }
  body { background:#e7dcc4; padding:20px; }
  .theme { padding:20px; background:var(--surface); }
  h1 { font-size:15px; margin-bottom:4px; color:var(--ink-1); }
  .sub { font-size:12px; color:var(--ink-3); margin-bottom:14px; }
  .label { font-size:11.5px; font-weight:700; color:var(--accent); margin:18px 0 6px; letter-spacing:.02em; text-transform:uppercase; }
  .card { max-width:720px; background:var(--surface-elev); border:1px solid var(--line);
    border-radius:14px; padding:22px; box-shadow:var(--shadow-card);
    display:flex; flex-wrap:wrap; align-items:center; gap:18px; }
  .icon { width:44px; height:44px; flex-shrink:0; border-radius:12px; background:var(--accent-soft);
    color:var(--accent); display:flex; align-items:center; justify-content:center; font-size:24px; }
  .grow { flex:1 1 260px; min-width:0; }
  .title { font-size:18px; font-weight:700; color:var(--ink-1); line-height:1.3; }
  .lede { font-size:13.5px; color:var(--ink-3); margin-top:3px; line-height:1.5; }
  .aff { flex:0 1 auto; display:flex; align-items:center; }
  .btn { padding:11px 18px; border-radius:10px; min-height:44px; background:var(--green);
    color:var(--bone); border:none; font-size:15px; font-weight:600; white-space:nowrap; }
  .step { font-size:13.5px; color:var(--ink-2); line-height:1.5; }
  svg { vertical-align:-3px; margin:0 1px; }
</style>
</head>
<body>
<script>
  // The six affordance states the component renders (installed → nothing).
  const SHARE = '<svg width="15" height="18" viewBox="0 0 15 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M7.5 1.5v9"/><path d="M4.5 4.5 7.5 1.5 10.5 4.5"/><path d="M3.5 7.5H2.5A1.5 1.5 0 0 0 1 9v6a1.5 1.5 0 0 0 1.5 1.5h10A1.5 1.5 0 0 0 14 15V9a1.5 1.5 0 0 0-1.5-1.5h-1"/></svg>';
  const STATES = [
    { label: 'Android / Desktop Chromium — beforeinstallprompt gefeuert → ECHTER Installieren-Knopf', aff: '<button class="btn">App installieren</button>' },
    { label: 'Chromium, Prompt noch nicht verfügbar — ehrlicher Menü-Hinweis, KEIN toter Knopf', aff: '<div class="step">Öffne das Browser-Menü und wähle „App installieren“ bzw. „Zum Startbildschirm hinzufügen“.</div>' },
    { label: 'iPhone / iPad Safari — echte Teilen-Schritte, KEIN Knopf (Apple erlaubt keinen Prompt)', aff: '<div class="step">Tippe auf Teilen ' + SHARE + ' → „Zum Home-Bildschirm“.</div>' },
    { label: 'macOS Safari — Dock-Route', aff: '<div class="step">In Safari: „Ablage“ → „Zum Dock hinzufügen“.</div>' },
    { label: 'Firefox / kein Installationspfad — eine ehrliche Zeile, keine Affordanz', aff: '<div class="step">Dein Browser unterstützt die Installation nicht — Goblin läuft voll im Tab.</div>' },
  ];
  function render(dark) {
    const wrap = document.createElement('div');
    wrap.className = 'theme' + (dark ? ' dark' : '');
    wrap.innerHTML = '<h1>InstallAppBlock — ' + (dark ? 'DARK' : 'LIGHT') + '</h1>'
      + '<div class="sub">Bereits als PWA installiert → der gesamte Block wird ausgeblendet (kein Screenshot-Zustand).</div>';
    STATES.forEach(s => {
      const l = document.createElement('div'); l.className = 'label'; l.textContent = s.label; wrap.appendChild(l);
      const c = document.createElement('div'); c.className = 'card';
      c.innerHTML = '<span class="icon">📲</span>'
        + '<div class="grow"><div class="title">Goblin läuft auf jedem Gerät</div>'
        + '<div class="lede">Als App auf deinem Home-Bildschirm. Kein App Store nötig.</div></div>'
        + '<div class="aff">' + s.aff + '</div>';
      wrap.appendChild(c);
    });
    document.body.appendChild(wrap);
  }
  render(false);
  render(true);
</script>
</body>
</html>
