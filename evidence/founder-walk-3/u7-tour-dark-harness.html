<!doctype html>
<html><head><meta charset="utf-8"><style>
  /* Dark-mode tokens (styles/design-tokens.css [data-theme="dark"]) */
  :root { --panel:#08170F; --text:#FBF7EC; --meta:#968768; --brand-fg:#7FA98A;
          --div:rgba(247,247,236,0.06); --border:rgba(247,247,236,0.10);
          --brand-green:#1A3A2A; --brand-gold:#D4A737; --font-sans:-apple-system,system-ui,sans-serif; }
  * { box-sizing:border-box; margin:0; }
  body { background:#111; padding:22px; font-family:var(--font-sans); display:flex; gap:24px; flex-wrap:wrap; }
  .col { display:flex; flex-direction:column; gap:8px; }
  .cap { color:#fff; font-size:12px; font-weight:600; }
  /* a dark dashboard backdrop behind the popup, like the real over-dashboard state */
  .stage { position:relative; width:390px; height:420px; border-radius:20px; overflow:hidden; border:2px solid #000;
           background:#133224; }
  .stage::before { content:"Dashboard"; position:absolute; top:16px; left:16px; color:rgba(244,236,216,.4); font-size:13px; }
  .backdrop { position:absolute; inset:0; background:rgba(0,0,0,0.35); }
  .card { position:absolute; bottom:24px; left:50%; transform:translateX(-50%); z-index:2;
          background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:20px 24px;
          width:min(340px, calc(100% - 32px)); box-shadow:0 8px 40px rgba(0,0,0,0.18); }
  .close { position:absolute; top:12px; right:12px; width:28px; height:28px; border-radius:50%;
           background:var(--div); border:none; display:flex; align-items:center; justify-content:center;
           color:var(--meta); font-size:15px; cursor:pointer; }
  .dots { display:flex; gap:6px; margin-bottom:16px; }
  .dot { height:4px; flex:1; border-radius:2px; background:var(--div); }
  .dot.on { background:var(--brand-fg); }
  .icon { font-size:28px; margin-bottom:10px; }
  h3 { font-size:15px; font-weight:700; color:var(--text); margin:0 0 8px; letter-spacing:-0.3px; }
  p { font-size:13px; color:var(--meta); line-height:1.6; margin:0 0 20px; }
  .foot { display:flex; align-items:center; justify-content:space-between; }
  .skip { background:none; border:none; color:var(--meta); font-size:12px; cursor:pointer; text-decoration:underline; text-decoration-color:var(--border); }
  .next { padding:9px 20px; background:var(--brand-green); color:var(--brand-gold); border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; }
</style></head>
<body>
<script>
  const STEPS=[
    {icon:'📁',title:'Hier leben deine Projekte',body:'Erstelle neue Projekte über die Seitenleiste. Jedes Projekt hat eigenen Chat, Code und eine Vorschau.',next:'Weiter →'},
    {icon:'✦',title:'Vom Chat in den Code',body:'Bitte Goblin, etwas zu bauen. Gibt es Code aus, bringt [An Code senden] ihn als Entwurf in den Code-Tab — du sicherst und veröffentlichst, wenn du bereit bist.',next:'Weiter →'},
    {icon:'📊',title:'Behalte deinen Verbrauch im Blick',body:'Sieh, wie viele Anfragen du diesen Monat genutzt hast. Upgrade oder eigener KI-Schlüssel (BYOK) jederzeit.',next:'Los geht’s →'},
  ];
  function dots(active){return STEPS.map((_,i)=>`<div class="dot ${i<=active?'on':''}"></div>`).join('');}
  function card(s,i){return `<div class="backdrop"></div><div class="card"><button class="close">×</button><div class="dots">${dots(i)}</div><div class="icon">${s.icon}</div><h3>${s.title}</h3><p>${s.body}</p><div class="foot"><button class="skip">Tour überspringen</button><button class="next">${s.next}</button></div></div>`;}
  STEPS.forEach((s,i)=>{const el=document.createElement('div');el.className='col';el.innerHTML=`<div class="cap">DARK · Step ${i+1}/3</div><div class="stage">${card(s,i)}</div>`;document.body.appendChild(el);});
</script>
</body></html>
