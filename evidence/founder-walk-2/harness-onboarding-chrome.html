<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  /* Onboarding token subset (styles/onboarding-tokens.css resolved values). */
  :root {
    --surface: #F4ECD8; --ink-1: #0F2B1E; --ink-3: #5c6f64; --line: rgba(15,43,30,.12);
    --green: #1A3A2A; --accent: #D4A737;
    /* Simulated device insets — env(safe-area-inset-*) is 0 in a normal browser,
       so we model an iPhone 14's notch/home-indicator to make the fix visible. */
    --sa-top: 47px; --sa-bottom: 34px;
    --font-sans: -apple-system, system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  :root[data-theme="dark"] { --surface: #0F2B1E; --ink-1: #F4ECD8; --ink-3: rgba(244,236,216,.55); --line: rgba(244,236,216,.10); }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: var(--font-sans); }
  .shell { display: flex; flex-direction: column; min-height: 720px; background: var(--surface); color: var(--ink-1); }

  .top { padding: 22px 32px; display: flex; align-items: center; justify-content: space-between; gap: 18px; border-bottom: 1px solid var(--line); background: var(--surface); }
  .lockup { display: inline-flex; align-items: center; gap: 10px; }
  .mark { width: 22px; height: 22px; border-radius: 6px; background: var(--green); display: inline-block; }
  .wordmark { font-weight: 800; font-size: 13px; letter-spacing: 0.16em; color: var(--ink-1); }
  .help { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }
  .body { flex: 1; padding: 24px 32px; }
  .foot { border-top: 1px solid var(--line); padding: 18px 32px; display: flex; align-items: center; justify-content: space-between;
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.10em; text-transform: uppercase; color: var(--ink-3); background: var(--surface); }

  /* AFTER: the shipped fix — design padding + the (simulated) inset. */
  :root[data-state="after"] .top {
    padding-top: calc(22px + var(--sa-top));
    padding-left: max(32px, var(--sa-left, 0px));
    padding-right: max(32px, var(--sa-right, 0px));
  }
  :root[data-state="after"] .foot {
    padding-bottom: calc(18px + var(--sa-bottom));
  }

  /* Simulated iOS chrome overlays (not part of the page — the device draws these). */
  .statusbar { position: fixed; top: 0; left: 0; right: 0; height: var(--sa-top); background: rgba(0,0,0,.82);
    color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 22px 0 28px; font-size: 15px; font-weight: 600; z-index: 100; }
  .homeind { position: fixed; bottom: 0; left: 0; right: 0; height: var(--sa-bottom); background: rgba(0,0,0,.82); z-index: 100;
    display: flex; align-items: center; justify-content: center; }
  .homeind::after { content: ''; width: 134px; height: 5px; border-radius: 3px; background: rgba(255,255,255,.9); margin-bottom: 8px; }
  .badge { position: fixed; top: calc(var(--sa-top) + 6px); right: 8px; z-index: 101; font: 700 10px var(--font-mono);
    background: var(--accent); color: #241a02; padding: 2px 7px; border-radius: 4px; letter-spacing: .08em; }
</style>
</head>
<body>
  <div class="shell">
    <header class="top">
      <span class="lockup"><span class="mark"></span><span class="wordmark">GOBLIN</span></span>
      <span class="help">HILFE</span>
    </header>
    <main class="body"></main>
    <footer class="foot">
      <span>JUSTGOBLIN.COM</span>
      <span>SCHRITT 01 VON 06</span>
    </footer>
  </div>
  <!-- device chrome -->
  <div class="statusbar"><span>9:41</span><span>📶 🔋</span></div>
  <div class="homeind"></div>
  <div class="badge" id="badge">BEFORE</div>
  <script>
    const p = new URLSearchParams(location.search);
    const state = p.get('state') === 'after' ? 'after' : 'before';
    document.documentElement.setAttribute('data-state', state);
    document.getElementById('badge').textContent = state.toUpperCase();
    if (p.get('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  </script>
</body>
</html>
