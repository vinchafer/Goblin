<!doctype html><html lang="de"><head><meta charset="utf-8">
<title>Code Tab — Desktop · Empty</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--brand-green:#1A3A2A;--brand-gold:#D4A737;--paper:#FBF7EC;--surface-0:#FFFFFF;--surface-1:#FBF7EC;--surface-2:#F4ECD8;--surface-3:#E8DEC2;--ink-1:#0F2B1E;--ink-2:#3F3A2C;--ink-3:#5F5640;--rule:#D8CBA8;--rule-strong:#B8A988;--font-sans:'Manrope',sans-serif;--font-mono:'JetBrains Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:#cdbf9d;display:flex;align-items:center;justify-content:center;min-height:100vh;-webkit-font-smoothing:antialiased}
.frame{width:1280px;height:860px;background:var(--surface-1);box-shadow:0 24px 60px -20px rgba(15,43,30,.4);overflow:hidden;display:flex;flex-direction:column}
.tick{display:inline-block;width:7px;height:7px;background:var(--brand-gold);transform:rotate(45deg)}
.tabbar{height:44px;background:var(--brand-green);display:flex;align-items:center;color:#FBF7EC;flex:none}
.stab{display:flex;align-items:center;gap:8px;padding:0 18px;height:100%;font-size:13px;font-weight:600;background:var(--surface-1);color:var(--ink-1)}
.newsess{display:flex;align-items:center;gap:6px;padding:0 16px;font-size:13px;color:rgba(251,247,236,.75)}
.tbright{margin-left:auto;display:flex;align-items:center;gap:14px;padding:0 18px;font-size:12px}
.themepill{display:flex;align-items:center;gap:6px;border:1px solid rgba(255,255,255,.2);border-radius:999px;padding:4px 11px;font-size:12px;color:rgba(251,247,236,.85)}
.body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}
.mark{width:60px;height:60px;border-radius:18px;background:var(--surface-2);border:1px solid var(--rule);display:flex;align-items:center;justify-content:center;margin-bottom:26px}
.mark .tick{width:22px;height:22px;background:var(--brand-gold)}
h1{font-size:28px;font-weight:600;letter-spacing:-.4px;color:var(--ink-1);margin-bottom:12px}
.lead{font-size:16px;line-height:1.6;color:var(--ink-3);max-width:440px;margin-bottom:34px}
.cbox{width:600px;border:1px solid var(--rule-strong);border-radius:16px;background:var(--surface-0);padding:16px 18px;box-shadow:0 6px 16px -8px rgba(15,43,30,.18)}
.cbox textarea{width:100%;border:none;outline:none;resize:none;font-family:var(--font-sans);font-size:15px;color:var(--ink-2);background:transparent;height:48px;line-height:1.5}
.cbox textarea::placeholder{color:#9c9176}
.crow{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.mchip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--rule);border-radius:999px;padding:5px 12px;font-size:12.5px;color:var(--ink-2);font-weight:500}
.send{display:inline-flex;align-items:center;gap:7px;background:var(--brand-green);color:var(--paper);border:none;border-radius:11px;padding:9px 18px;font-size:13.5px;font-weight:600}
.hints{display:flex;gap:10px;margin-top:22px}
.hint{font-size:12.5px;color:var(--ink-3);border:1px solid var(--rule);border-radius:999px;padding:7px 14px;background:var(--surface-1)}
svg{flex:none}
</style></head>
<body>
<div class="frame">
  <div class="tabbar">
    <div class="stab"><span class="tick"></span> Neue Session</div>
    <div class="newsess">＋ Neue Session</div>
    <div class="tbright"><span class="themepill">☀ Hell</span></div>
  </div>
  <div class="body">
    <div class="mark"><span class="tick"></span></div>
    <h1>Noch nichts hier.</h1>
    <p class="lead">Stell unten eine Aufgabe — Goblin baut den Code direkt in dieser Session. Oder öffne eine Datei aus dem Projekt.</p>
    <div class="cbox">
      <textarea placeholder="z. B. „Bau eine Landing-Page mit Hero und Preisliste"…"></textarea>
      <div class="crow">
        <span class="mchip">⚡ gemini-flash ▾</span>
        <button class="send">Senden <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#FBF7EC" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></button>
      </div>
    </div>
    <div class="hints">
      <span class="hint">＋ Datei öffnen</span>
      <span class="hint">↧ Aus dem Chat übernehmen</span>
    </div>
  </div>
</div>
</body></html>
